# In-memory DB for tests (avoids requiring local MySQL).
spring.datasource.url=jdbc:h2:mem:crowdfunding_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

jwt.secret=CHANGE_ME_TO_A_LONG_RANDOM_256_BIT_SECRET_KEY_VALUE
jwt.expiration=86400000

